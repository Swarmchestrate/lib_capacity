
[tool.poetry]
name = "swchcapreg"
version = "0.1.0"
description = "A library to manage resources and offers generated from application requirements"
authors = [
    "Dr. József Kovács <jozsef.kovacs@sztaki.hu>",
    "Bencee Ligetfalvi <ligetfalvi.bence@sztaki.hu>",
]

readme = "README.md"
# package directory in this repository is `swch_capreg`
packages = [{ include = "swch_capreg" }]

[tool.poetry.dependencies]
python = ">=3.12,<4.0"
PyYAML = "^6.0"
Sardou = "0.4.2"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.3"
black = "^24.3.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
